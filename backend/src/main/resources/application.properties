# Database configuration (uses H2 for local, PostgreSQL for production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:quickbite}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

# Google Maps API Key
google.maps.api.key=${GOOGLE_MAPS_API_KEY:YOUR_GOOGLE_MAPS_API_KEY}

# JWT Configuration
jwt.secret=quickbite-secret-key-for-jwt-token-generation-must-be-long-enough-for-security
jwt.expiration=86400000

# Error handling
server.error.include-message=always

# Mail Configuration (Set these in Render environment variables)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true