# Production Profile
spring.profiles.active=prod

# Data Source (Supports MySQL and PostgreSQL via DATABASE_URL)
spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quickbite}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=false
# Hibernate will try to detect the dialect based on the connection

# Actuator (Monitoring)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Caching
spring.cache.type=simple

# Google Maps API Key
google.maps.api.key=${GOOGLE_MAPS_API_KEY}
