# Production Profile

# Server Port (Render injects PORT env var)
server.port=${PORT:8080}

# Data Source - PostgreSQL (overrides H2 defaults from application.properties)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Actuator (Monitoring)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Caching
spring.cache.type=simple

# Disable H2 console (H2 is on classpath but must not run in prod)
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# Google Maps API Key
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}

# JWT Configuration
jwt.secret=${JWT_SECRET:quickbite-secret-key-for-jwt-token-generation-must-be-long-enough-for-security}
jwt.expiration=${JWT_EXPIRATION:86400000}
