# Production Profile

# Server Port (Render injects PORT env var)
server.port=${PORT:8080}

# Data Source configured via DatabaseConfig.java
# spring.datasource.url, username, password and driver-class-name are handled by DatabaseConfig

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Actuator (Monitoring)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Caching
spring.cache.type=simple

# Disable H2 console (H2 is on classpath but must not run in prod)
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# Google Maps API Key
google.maps.api.key=${GOOGLE_MAPS_API_KEY}
