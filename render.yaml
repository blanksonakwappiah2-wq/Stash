services:
  - type: web
    name: quickbite-backend
    env: docker
    dockerContext: .
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: quickbite-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: quickbite-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: quickbite-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: GOOGLE_MAPS_API_KEY
        sync: false

databases:
  - name: quickbite-db
    databaseName: quickbite
    user: quickbite_user
    plan: free
