name: quickbite-app
services:
  - name: quickbite-backend
    type: web
    image: blanksonakwappiah2-wq/Stash:main
    # Since we are deploying from GitHub, image is not needed if using source
    source:
      repository: blanksonakwappiah2-wq/Stash
      branch: main
      docker:
        dockerfile: Dockerfile
    ports:
      - port: 10000
        protocol: http
    env:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        value: "${{ database.HOST }}"
      - key: DB_PORT
        value: "${{ database.PORT }}"
      - key: DB_NAME
        value: "${{ database.DATABASE }}"
      - key: SPRING_DATASOURCE_USERNAME
        value: "${{ database.USER }}"
      - key: SPRING_DATASOURCE_PASSWORD
        value: "${{ database.PASSWORD }}"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: PORT
        value: "10000"
      - key: GOOGLE_MAPS_API_KEY
        value: "DEMO_KEY"
      - key: JWT_SECRET
        value: "quickbite-secret-key-for-jwt-token-generation-must-be-long-enough-for-security"
